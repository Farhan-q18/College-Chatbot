<!DOCTYPE html>
<html>
<head>
    <title>HITK CHATBOT</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: #0f172a;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .chat-container {
        width: 420px;
        height: 600px;
        background: #1e293b;
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        overflow: hidden;
    }

    .header {
        background: #2563eb;
        color: white;
        padding: 15px;
        text-align: center;
        font-size: 18px;
        font-weight: bold;
    }

    .chat-box {
        flex: 1;
        padding: 15px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .message {
        max-width: 75%;
        padding: 10px 14px;
        border-radius: 15px;
        line-height: 1.4;
    }

    .user {
        align-self: flex-end;
        background: #2563eb;
        color: white;
    }

    .bot {
        align-self: flex-start;
        background: #334155;
        color: #e2e8f0;
    }

    .input-area {
        display: flex;
        padding: 10px;
        background: #0f172a;
    }

    input {
        flex: 1;
        padding: 12px;
        border-radius: 10px;
        border: none;
        outline: none;
        background: #1e293b;
        color: white;
    }

    button {
        margin-left: 10px;
        padding: 12px 16px;
        border: none;
        border-radius: 10px;
        background: #2563eb;
        color: white;
        cursor: pointer;
    }

    button:hover {
        background: #1d4ed8;
    }

    a {
        color: #60a5fa;
    }
</style>

</head>

<body>

<div class="chat-container">

<div class="header">
    🎓 College Helpdesk Bot
</div>

<div class="chat-box" id="chatBox">
    <div class="message bot">
        👋 Hi, I am your HITK Chatbot.<br><br>
        Before we begin, may I know your name?
    </div>
</div>

<div class="input-area">
    <input type="text" id="msg" placeholder="Type your message...">
    <button onclick="send()">Send</button>
</div>

</div>

<script>

let userName = "";

function send() {
    let msgInput = document.getElementById("msg");
    let msg = msgInput.value.trim();

    if (!msg) return;

    let chatBox = document.getElementById("chatBox");

    // Show user message
    chatBox.innerHTML += `<div class="message user">${msg}</div>`;

    // Words that are NOT names
    const invalidNames = ["hi", "hello", "hey", "yo"];

    // 🔥 NAME LOGIC
    if (userName === "") {

        let typingDiv = document.createElement("div");
        typingDiv.className = "message bot";
        typingDiv.innerText = "Bot is typing...";
        chatBox.appendChild(typingDiv);

        setTimeout(() => {

            if (invalidNames.includes(msg.toLowerCase())) {
                typingDiv.innerHTML = `
                😊 I didn't catch your name.<br>
                Please tell me your name to continue.
                `;
            } else {
                // Extract name from sentence
let lowerMsg = msg.toLowerCase();

if (lowerMsg.includes("my name is")) {
    userName = msg.split("my name is")[1].trim();
}
else if (lowerMsg.includes("i am")) {
    userName = msg.split("i am")[1].trim();
}
else {
    userName = msg;
}

// Capitalize first letter
userName = userName.charAt(0).toUpperCase() + userName.slice(1);

                typingDiv.innerHTML = `
                Nice to meet you, <b>${userName}</b> 👋<br><br>
                I can assist you with:<br>
                • Admission<br>
                • Fees<br>
                • Courses<br>
                • Routine<br>
                • Notices<br>
                • Student Portal<br><br>
                How can I help you today?
                `;
            }

            chatBox.scrollTop = chatBox.scrollHeight;

        }, 800);

        msgInput.value = "";
        return;
    }

    // 🔥 NORMAL CHATBOT FLOW
    let typingDiv = document.createElement("div");
    typingDiv.className = "message bot";
    typingDiv.innerText = "Bot is typing...";
    chatBox.appendChild(typingDiv);

    chatBox.scrollTop = chatBox.scrollHeight;

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: msg})
    })
    .then(res => res.json())
    .then(data => {

        let response = data.response;

        if (response.includes("http")) {
            response = response.replace(
                /(https?:\/\/[^\s]+)/g,
                '<a href="$1" target="_blank">📄 Open Link</a>'
            );
        }

        // Personalize response
        response = `👤 <b>${userName}</b>,<br>${response}`;

        typingDiv.innerHTML = response;
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    msgInput.value = "";
}

// Enter key support
document.getElementById("msg").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        send();
    }
});

// Auto focus
document.getElementById("msg").focus();

</script>

</body>
</html>
